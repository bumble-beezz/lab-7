{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/todos.js')}}"></script>
{% endblock %}

{% block additional_styles %}
<style>
    .todo-card {
        transition: all 0.3s ease;
        border-left: 4px solid #0d6efd;
    }
    
    .todo-card.completed {
        border-left-color: #28a745;
        background-color: #f8fff8;
    }
    
    .todo-card.completed .todo-title {
        text-decoration: line-through;
        color: #6c757d;
    }
    
    .todo-checkbox {
        cursor: pointer;
        width: 20px;
        height: 20px;
    }
    
    .btn-todo-action {
        padding: 4px 8px;
        font-size: 12px;
    }
    
    .filter-btn {
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .filter-btn.active {
        background-color: #0d6efd;
        color: white;
        border-color: #0d6efd;
    }
    
    .due-date {
        font-size: 12px;
        color: #6c757d;
    }
    
    .due-date.overdue {
        color: #dc3545;
        font-weight: bold;
    }
    
    .description-preview {
        font-size: 14px;
        color: #6c757d;
        margin-top: 5px;
    }
    
    .modal-content {
        border-radius: 1rem;
    }
</style>
{% endblock %}

{% block subpage_content %}

<div class="container" id="content">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">My Todo List</h5>
                    
                    <!-- Add Todo Form -->
                    <div class="mb-4">
                        <form id="addTodoForm">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="todoTitle" placeholder="Todo title" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="datetime-local" class="form-control" id="todoDueDate">
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100">
                                        <span class="material-symbols-outlined me-1" style="font-size: 16px;">add</span>
                                        Add Todo
                                    </button>
                                </div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-12">
                                    <textarea class="form-control" id="todoDescription" rows="2" placeholder="Description (optional)"></textarea>
                                </div>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Filter Buttons -->
                    <div class="mb-3">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-outline-secondary filter-btn active" data-filter="all">All</button>
                            <button type="button" class="btn btn-outline-secondary filter-btn" data-filter="pending">Pending</button>
                            <button type="button" class="btn btn-outline-secondary filter-btn" data-filter="completed">Completed</button>
                        </div>
                    </div>
                    
                    <!-- Loading Indicator -->
                    <div id="loadingIndicator" class="text-center d-none">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    
                    <!-- Todos List -->
                    <div id="todosList">
                        <!-- Todos will be dynamically loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Todo Modal -->
<div class="modal fade" id="editTodoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Todo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editTodoForm">
                    <input type="hidden" id="editTodoId">
                    <div class="mb-3">
                        <label for="editTitle" class="form-label">Title</label>
                        <input type="text" class="form-control" id="editTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="editDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="editDueDate" class="form-label">Due Date</label>
                        <input type="datetime-local" class="form-control" id="editDueDate">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="editCompleted">
                        <label class="form-check-label" for="editCompleted">Completed</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveTodoBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block subpage_scripts %}
<script>
    const editModal = new bootstrap.Modal(document.getElementById('editTodoModal'));
    let currentFilter = 'all';
    let allTodos = [];
    
    document.addEventListener('DOMContentLoaded', function() {
        loadTodos();
        document.getElementById('addTodoForm').addEventListener('submit', addTodo);
        document.getElementById('saveTodoBtn').addEventListener('click', updateTodo);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTodos();
            });
        });
    });
    
    async function loadTodos() {
        showLoading(true);
        try {
            const response = await fetch('/api/todos/', {
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error('Failed to load todos');
            }
            
            allTodos = await response.json();
            renderTodos();
        } catch (error) {
            console.error('Error loading todos:', error);
            showError('Failed to load todos. Please refresh the page.');
        } finally {
            showLoading(false);
        }
    }
    
    function renderTodos() {
        const filteredTodos = filterTodos(allTodos);
        const todosList = document.getElementById('todosList');
        
        if (filteredTodos.length === 0) {
            todosList.innerHTML = `
                <div class="text-center py-5">
                    <span class="material-symbols-outlined" style="font-size: 48px; color: #6c757d;">inbox</span>
                    <p class="text-muted mt-2">No todos found</p>
                </div>
            `;
            return;
        }
        
        todosList.innerHTML = filteredTodos.map(todo => `
            <div class="card mb-3 todo-card ${todo.completed ? 'completed' : ''}" data-todo-id="${todo.id}">
                <div class="card-body">
                    <div class="d-flex align-items-start justify-content-between">
                        <div class="d-flex align-items-start flex-grow-1">
                            <input type="checkbox" class="todo-checkbox me-3 mt-1" ${todo.completed ? 'checked' : ''} onchange="toggleComplete(${todo.id})">
                            <div class="flex-grow-1">
                                <h6 class="todo-title mb-1 ${todo.completed ? 'text-muted' : ''}">${escapeHtml(todo.title)}</h6>
                                ${todo.description ? `<div class="description-preview">${escapeHtml(todo.description)}</div>` : ''}
                                ${todo.due_date ? `<div class="due-date ${isOverdue(todo.due_date, todo.completed) ? 'overdue' : ''} mt-2">
                                    <span class="material-symbols-outlined" style="font-size: 14px;">event</span>
                                    Due: ${formatDate(todo.due_date)}
                                </div>` : ''}
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary btn-todo-action me-1" onclick="editTodo(${todo.id})">
                                <span class="material-symbols-outlined" style="font-size: 16px;">edit</span>
                            </button>
                            <button class="btn btn-sm btn-outline-danger btn-todo-action" onclick="deleteTodo(${todo.id})">
                                <span class="material-symbols-outlined" style="font-size: 16px;">delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function filterTodos(todos) {
        if (currentFilter === 'pending') {
            return todos.filter(todo => !todo.completed);
        } else if (currentFilter === 'completed') {
            return todos.filter(todo => todo.completed);
        }
        return todos;
    }
    
    async function addTodo(event) {
        event.preventDefault();
        
        const title = document.getElementById('todoTitle').value.trim();
        if (!title) {
            showError('Please enter a todo title');
            return;
        }
        
        const todoData = {
            title: title,
            description: document.getElementById('todoDescription').value.trim() || null,
            due_date: document.getElementById('todoDueDate').value || null,
            completed: false
        };
        
        try {
            const response = await fetch('/api/todos/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(todoData)
            });
            
            if (!response.ok) {
                throw new Error('Failed to add todo');
            }
            
            document.getElementById('addTodoForm').reset();
            
            await loadTodos();
            
            showSuccess('Todo added successfully!');
        } catch (error) {
            console.error('Error adding todo:', error);
            showError('Failed to add todo. Please try again.');
        }
    }
    
    async function toggleComplete(todoId) {
        try {
            const response = await fetch(`/api/todos/${todoId}/toggle`, {
                method: 'PATCH',
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error('Failed to toggle todo status');
            }
            
            await loadTodos();
        } catch (error) {
            console.error('Error toggling todo:', error);
            showError('Failed to update todo status.');
        }
    }
    
    async function editTodo(todoId) {
        try {
            const response = await fetch(`/api/todos/${todoId}`);
            if (!response.ok) {
                throw new Error('Failed to load todo');
            }
            
            const todo = await response.json();
            
            document.getElementById('editTodoId').value = todo.id;
            document.getElementById('editTitle').value = todo.title;
            document.getElementById('editDescription').value = todo.description || '';
            document.getElementById('editDueDate').value = todo.due_date ? todo.due_date.slice(0, 16) : '';
            document.getElementById('editCompleted').checked = todo.completed;
            
            editModal.show();
        } catch (error) {
            console.error('Error loading todo for edit:', error);
            showError('Failed to load todo details.');
        }
    }
    
    async function updateTodo() {
        const todoId = document.getElementById('editTodoId').value;
        const updateData = {
            title: document.getElementById('editTitle').value.trim(),
            description: document.getElementById('editDescription').value.trim() || null,
            due_date: document.getElementById('editDueDate').value || null,
            completed: document.getElementById('editCompleted').checked
        };
        
        if (!updateData.title) {
            showError('Title is required');
            return;
        }
        
        try {
            const response = await fetch(`/api/todos/${todoId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(updateData)
            });
            
            if (!response.ok) {
                throw new Error('Failed to update todo');
            }
            
            editModal.hide();
            await loadTodos();
            showSuccess('Todo updated successfully!');
        } catch (error) {
            console.error('Error updating todo:', error);
            showError('Failed to update todo.');
        }
    }
    
    async function deleteTodo(todoId) {
        if (!confirm('Are you sure you want to delete this todo?')) {
            return;
        }
        
        try {
            const response = await fetch(`/api/todos/${todoId}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                throw new Error('Failed to delete todo');
            }
            
            await loadTodos();
            showSuccess('Todo deleted successfully!');
        } catch (error) {
            console.error('Error deleting todo:', error);
            showError('Failed to delete todo.');
        }
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }
    
    function isOverdue(dueDate, completed) {
        if (completed) return false;
        const due = new Date(dueDate);
        const now = new Date();
        return due < now;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showLoading(show) {
        const indicator = document.getElementById('loadingIndicator');
        if (show) {
            indicator.classList.remove('d-none');
        } else {
            indicator.classList.add('d-none');
        }
    }
    
    function showError(message) {
        alert(message);
    }
    
    function showSuccess(message) {
        alert(message);
    }
</script>
{% endblock %}
